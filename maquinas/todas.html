<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="container">
    <section class="card" style="margin-bottom: 2rem;">
      <h1>Todas nuestras líneas</h1>
      <p>Explora nuestra gama completa de máquinas y equipos industriales.</p>
    </section>

    <section class="grid grid-auto">
      
      <article class="card" style="display: flex; flex-direction: column; justify-content: space-between;">
        <div>
          <picture>
            <img src="../assets/img/maquina16.png" alt="Inyectora de plástico" loading="lazy" style="width: 100%; height: 250px; object-fit: cover;">
          </picture>
          <h3 style="margin-top: 1rem;">Inyectora de plástico SSF720</h3>
          <p>Ideal para grandes producciones continuas.</p>
        </div>
        
        <div style="margin-top: 1.5rem; text-align: center; border-top: 1px solid var(--line); padding-top: 1rem;">
          <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem;">Fabricante:</p>
          <a href="#" target="_blank" rel="noopener noreferrer" style="display: inline-block;">
            <img src="../assets/img/logo-borche-ejemplo.png" alt="Borche" style="max-height: 40px; display: block; margin: 0 auto;" onerror="this.outerHTML='<strong style=\'color: var(--brand-500);\'>BORCHE (Clic aquí)</strong>'">
          </a>
        </div>
      </article>

      <article class="card" style="display: flex; flex-direction: column; justify-content: space-between;">
        <div>
          <picture>
            <img src="../assets/img/electroerosion-nspark.webp.jpeg" alt="Electroerosión" loading="lazy" style="width: 100%; height: 250px; object-fit: cover;">
          </picture>
          <h3 style="margin-top: 1rem;">Máquina de electroerosión (EDM)</h3>
          <p>Alta precisión para la industria metalmecánica.</p>
        </div>
        
        <div style="margin-top: 1.5rem; text-align: center; border-top: 1px solid var(--line); padding-top: 1rem;">
          <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem;">Fabricante:</p>
          <a href="#" target="_blank" rel="noopener noreferrer" style="display: inline-block;">
            <img src="../assets/img/logo-accutex-ejemplo.png" alt="Accutex" style="max-height: 40px;" onerror="this.outerHTML='<strong style=\'color: var(--brand-500);\'>ACCUTEX (Clic aquí)</strong>'">
          </a>
        </div>
      </article>

      </section>
